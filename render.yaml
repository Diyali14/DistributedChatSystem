services:
  # 1. POSTGRESQL DATABASE
  - type: db
    name: chatsphere-postgres
    databaseName: chatsphere
    user: postgres
    plan: free

  # 2. REDIS CACHE & LOCKING
  - type: redis
    name: chatsphere-redis
    plan: free

  # 3. CENTRAL CONFIG SERVER
  - type: web
    name: config-server
    env: docker
    plan: free
    dockerfilePath: config-server/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: native

  # 4. DISCOVERY SERVER (EUREKA)
  - type: web
    name: discovery-server
    env: docker
    plan: free
    dockerfilePath: discovery-server/Dockerfile
    envVars:
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888

  # 5. API GATEWAY
  - type: web
    name: api-gateway
    env: docker
    plan: free
    dockerfilePath: api-gateway/Dockerfile
    ports:
      - port: 8080

  # 6. AUTHENTICATION SERVICE
  - type: web
    name: auth-service
    env: docker
    plan: free
    dockerfilePath: auth-service/Dockerfile
    ports:
      - port: 8081
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere

  # 7. USER PROFILE SERVICE
  - type: web
    name: user-service
    env: docker
    plan: free
    dockerfilePath: user-service/Dockerfile
    ports:
      - port: 8082
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere

  # 8. CHAT MESSAGE SERVICE
  - type: web
    name: chat-service
    env: docker
    plan: free
    dockerfilePath: chat-service/Dockerfile
    ports:
      - port: 8083
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere
      - key: SPRING_REDIS_HOST
        value: chatsphere-redis

  # 9. GROUP COLLABORATION SERVICE
  - type: web
    name: group-service
    env: docker
    plan: free
    dockerfilePath: group-service/Dockerfile
    ports:
      - port: 8084
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere
      - key: SPRING_REDIS_HOST
        value: chatsphere-redis

  # 10. MEDIA SERVICE
  - type: web
    name: media-service
    env: docker
    plan: free
    dockerfilePath: media-service/Dockerfile
    ports:
      - port: 8085

  # 11. PRESENCE TRACKING SERVICE
  - type: web
    name: presence-service
    env: docker
    plan: free
    dockerfilePath: presence-service/Dockerfile
    ports:
      - port: 8086
    envVars:
      - key: SPRING_REDIS_HOST
        value: chatsphere-redis

  # 12. ASYNCHRONOUS NOTIFICATION SERVICE
  - type: web
    name: notification-service
    env: docker
    plan: free
    dockerfilePath: notification-service/Dockerfile
    ports:
      - port: 8087
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere

  # 13. REAL-TIME ANALYTICS SERVICE
  - type: web
    name: analytics-service
    env: docker
    plan: free
    dockerfilePath: analytics-service/Dockerfile
    ports:
      - port: 8088
    envVars:
      - key: SPRING_REDIS_HOST
        value: chatsphere-redis

  # 14. COMPLIANCE AUDIT SERVICE
  - type: web
    name: audit-service
    env: docker
    plan: free
    dockerfilePath: audit-service/Dockerfile
    ports:
      - port: 8089
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://chatsphere-postgres:5432/chatsphere

  # 15. REACT FRONTEND STATIC SITE
  - type: web
    name: frontend
    env: static
    plan: free
    publishPath: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
