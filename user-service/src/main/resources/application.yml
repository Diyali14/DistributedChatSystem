server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import: "optional:configserver:http://config-server:8888"
  datasource:
    url: jdbc:postgresql://postgres:5432/chatsphere_auth
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
