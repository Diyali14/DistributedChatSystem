name: ChatSphere X CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Build with Maven
      run: mvn clean package -DskipTests=false

    - name: Build Frontend React APP
      run: |
        cd frontend
        npm install
        npm run build

    - name: Docker Build Check
      run: |
        docker build -t config-server:latest ./config-server
        docker build -t discovery-server:latest ./discovery-server
        docker build -t api-gateway:latest ./api-gateway
        docker build -t auth-service:latest ./auth-service
        docker build -t chat-service:latest ./chat-service
        docker build -t group-service:latest ./group-service
        docker build -t frontend:latest ./frontend
