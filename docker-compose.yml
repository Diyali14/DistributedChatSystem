version: '3.8'

services:
  # 1. DATABASE SYSTEM
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. CACHING & LOCK SYSTEM
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. MESSAGE BUS SYSTEM
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. DISTRIBUTED TRACING
  zipkin:
    image: openzipkin/zipkin-slim:latest
    container_name: zipkin
    ports:
      - "9411:9411"

  # 5. CONFIGURATION SERVER
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - JAVA_OPTS=-Xmx128m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. DISCOVERY SERVER (EUREKA)
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 7. ROUTING GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx192m
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 8. SERVICES PIPELINE
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - JAVA_OPTS=-Xmx192m
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - JAVA_OPTS=-Xmx192m
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  chat-service:
    build: ./chat-service
    container_name: chat-service
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  group-service:
    build: ./group-service
    container_name: group-service
    environment:
      - JAVA_OPTS=-Xmx256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  media-service:
    build: ./media-service
    container_name: media-service
    environment:
      - JAVA_OPTS=-Xmx192m
    depends_on:
      discovery-server:
        condition: service_healthy

  presence-service:
    build: ./presence-service
    container_name: presence-service
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  audit-service:
    build: ./audit-service
    container_name: audit-service
    environment:
      - JAVA_OPTS=-Xmx128m
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # 9. FRONTEND APP
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"

  # 10. REVERSE PROXY & GATEKEEPER
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  postgres_data:
